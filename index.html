<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ángela </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-text">Te Amo Mucho</div>
    
    <canvas id="canvas"></canvas>
    
    <div class="container">
        <div class="main-content">
            <!-- Órbita de corazones -->
            <div class="hearts-orbit">
                <div class="heart-particle">💕</div>
                <div class="heart-particle">💕</div>
                <div class="heart-particle">💕</div>
                <div class="heart-particle">💕</div>
                <div class="heart-particle">💕</div>
            </div>
            
            <!-- Título central -->
            <h1 class="title">Ángela</h1>
            
            <p class="subtitle">Eres mi Universo</p>
        </div>
    </div>
    
    <!-- Control de música -->
    <div class="music-controls">
        <button id="musicBtn" class="music-btn" title="Activar/Desactivar música">🎵</button>
    </div>
    
    <!-- Audio -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
    
    <script src="script.js"></script>
</body>
</html>
